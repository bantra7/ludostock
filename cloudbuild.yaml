substitutions:
  _REGION: europe-west1
  _ARTIFACT_REPOSITORY: ludostock
  _IMAGE_TAG: latest
  _APP_VERSION: dev
  _BACKEND_SERVICE: ludostock-backend
  _FRONTEND_SERVICE: ludostock-frontend
  _AUTH_SERVICE: ludostock-auth
  _BACKEND_IMAGE_NAME: backend
  _FRONTEND_IMAGE_NAME: frontend
  _AUTH_IMAGE_NAME: auth
  _BETTER_AUTH_SECRET_NAME: better-auth-secret
  _GOOGLE_CLIENT_ID_SECRET_NAME: google-client-id
  _GOOGLE_CLIENT_SECRET_SECRET_NAME: google-client-secret
  _AUTH_INTERNAL_SECRET_NAME: auth-internal-secret

options:
  logging: CLOUD_LOGGING_ONLY
  substitutionOption: ALLOW_LOOSE

steps:
  - id: Build backend image
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPOSITORY}/${_BACKEND_IMAGE_NAME}:${_IMAGE_TAG}
      - --build-arg
      - APP_VERSION=${_APP_VERSION}
      - .
    dir: backend

  - id: Build frontend image
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPOSITORY}/${_FRONTEND_IMAGE_NAME}:${_IMAGE_TAG}
      - --file
      - frontend/Dockerfile
      - .

  - id: Build auth image
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPOSITORY}/${_AUTH_IMAGE_NAME}:${_IMAGE_TAG}
      - --file
      - auth/Dockerfile
      - .

  - id: Push backend image
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPOSITORY}/${_BACKEND_IMAGE_NAME}:${_IMAGE_TAG}

  - id: Push frontend image
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPOSITORY}/${_FRONTEND_IMAGE_NAME}:${_IMAGE_TAG}

  - id: Push auth image
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPOSITORY}/${_AUTH_IMAGE_NAME}:${_IMAGE_TAG}

  - id: Deploy Cloud Run services
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -ceu
      - |
        REGION="${_REGION}"
        REPOSITORY="${_ARTIFACT_REPOSITORY}"
        TAG="${_IMAGE_TAG}"

        BACKEND_IMAGE="${REGION}-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/${_BACKEND_IMAGE_NAME}:$TAG"
        FRONTEND_IMAGE="${REGION}-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/${_FRONTEND_IMAGE_NAME}:$TAG"
        AUTH_IMAGE="${REGION}-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/${_AUTH_IMAGE_NAME}:$TAG"

        gcloud run deploy "${_AUTH_SERVICE}" \
          --image "$AUTH_IMAGE" \
          --region "$REGION" \
          --platform managed \
          --allow-unauthenticated \
          --port 3001 \
          --set-env-vars "PORT=3001,BETTER_AUTH_URL=https://bootstrap.invalid" \
          --set-secrets "BETTER_AUTH_SECRET=${_BETTER_AUTH_SECRET_NAME}:latest,GOOGLE_CLIENT_ID=${_GOOGLE_CLIENT_ID_SECRET_NAME}:latest,GOOGLE_CLIENT_SECRET=${_GOOGLE_CLIENT_SECRET_SECRET_NAME}:latest,AUTH_INTERNAL_SECRET=${_AUTH_INTERNAL_SECRET_NAME}:latest"

        AUTH_URL="$(gcloud run services describe "${_AUTH_SERVICE}" --region "$REGION" --format='value(status.url)')"

        gcloud run deploy "${_BACKEND_SERVICE}" \
          --image "$BACKEND_IMAGE" \
          --region "$REGION" \
          --platform managed \
          --allow-unauthenticated \
          --port 8081 \
          --set-env-vars "PORT=8081,ENVIRONMENT=production,SQLITE_PATH=/tmp/ludostock.db,AUTH_SERVICE_URL=${AUTH_URL},ALLOW_ORIGINS=*" \
          --set-secrets "AUTH_INTERNAL_SECRET=${_AUTH_INTERNAL_SECRET_NAME}:latest"

        BACKEND_URL="$(gcloud run services describe "${_BACKEND_SERVICE}" --region "$REGION" --format='value(status.url)')"

        gcloud run deploy "${_FRONTEND_SERVICE}" \
          --image "$FRONTEND_IMAGE" \
          --region "$REGION" \
          --platform managed \
          --allow-unauthenticated \
          --port 80 \
          --set-env-vars "BACKEND_UPSTREAM=${BACKEND_URL},AUTH_UPSTREAM=${AUTH_URL}"

        FRONTEND_URL="$(gcloud run services describe "${_FRONTEND_SERVICE}" --region "$REGION" --format='value(status.url)')"

        gcloud run deploy "${_AUTH_SERVICE}" \
          --image "$AUTH_IMAGE" \
          --region "$REGION" \
          --platform managed \
          --allow-unauthenticated \
          --port 3001 \
          --set-env-vars "PORT=3001,BETTER_AUTH_URL=${FRONTEND_URL}" \
          --set-secrets "BETTER_AUTH_SECRET=${_BETTER_AUTH_SECRET_NAME}:latest,GOOGLE_CLIENT_ID=${_GOOGLE_CLIENT_ID_SECRET_NAME}:latest,GOOGLE_CLIENT_SECRET=${_GOOGLE_CLIENT_SECRET_SECRET_NAME}:latest,AUTH_INTERNAL_SECRET=${_AUTH_INTERNAL_SECRET_NAME}:latest"

        gcloud run deploy "${_BACKEND_SERVICE}" \
          --image "$BACKEND_IMAGE" \
          --region "$REGION" \
          --platform managed \
          --allow-unauthenticated \
          --port 8081 \
          --set-env-vars "PORT=8081,ENVIRONMENT=production,SQLITE_PATH=/tmp/ludostock.db,AUTH_SERVICE_URL=${AUTH_URL},ALLOW_ORIGINS=${FRONTEND_URL}" \
          --set-secrets "AUTH_INTERNAL_SECRET=${_AUTH_INTERNAL_SECRET_NAME}:latest"

        echo "Frontend URL: ${FRONTEND_URL}"
        echo "Backend URL: ${BACKEND_URL}"
        echo "Auth URL: ${AUTH_URL}"

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPOSITORY}/${_BACKEND_IMAGE_NAME}:${_IMAGE_TAG}
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPOSITORY}/${_FRONTEND_IMAGE_NAME}:${_IMAGE_TAG}
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPOSITORY}/${_AUTH_IMAGE_NAME}:${_IMAGE_TAG}
