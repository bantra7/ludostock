services:
  auth:
    build:
      context: .
      dockerfile: auth/Dockerfile
    env_file:
      - ./docker-compose.secrets.txt
    environment:
      - PORT=3001
      - BETTER_AUTH_URL=http://localhost

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./docker-compose.secrets.txt
    ports:
      - "8081:8081"
    environment:
      - ENV_PATH=/app/app/.env
      - PORT=8081
      - SQLITE_PATH=/workspace/ludostock.db
      - ALLOW_ORIGINS=http://localhost,http://localhost:80,http://127.0.0.1,http://127.0.0.1:80,http://localhost:5173,http://127.0.0.1:5173
      - AUTH_SERVICE_URL=http://auth:3001
    volumes:
      - ./ludostock.db:/workspace/ludostock.db

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "80:80"
    environment:
      - BACKEND_UPSTREAM=http://backend:8081
      - AUTH_UPSTREAM=http://auth:3001
    depends_on:
      - auth
      - backend


networks:
  default:
    name: web_network
